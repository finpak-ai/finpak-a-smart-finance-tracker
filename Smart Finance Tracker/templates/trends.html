<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTracker AI - Trends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Aesthetic Tweaks */
        body { background-color: #f8f9fa; }
        .chart-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 15px;
            transition: transform 0.2s;
            height: 100%;
        }
        .chart-card:hover { transform: translateY(-3px); }
        .chart-title { font-size: 0.85rem; font-weight: 700; color: #8898aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .main-card { border-radius: 20px; box-shadow: 0 10px 30px rgba(78, 115, 223, 0.1); border: none; }
    </style>
</head>
<body class="bg-light pb-5">

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 text-primary fw-bold">Spending Trends</span>
            <a href="/dashboard" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        
        <div class="card main-card mb-5">
            <div class="card-body p-4">
                <h4 class="fw-bold text-dark mb-4">Overview: Income vs Spending</h4>
                <div style="height: 350px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

        <h5 class="fw-bold text-secondary mb-4 ps-2">Category Breakdown</h5>
        <div class="row g-4">
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Rent</div><canvas id="rentChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Groceries</div><canvas id="groceriesChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Transport</div><canvas id="transportChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Eating Out</div><canvas id="eatingChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Entertainment</div><canvas id="entChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Utilities</div><canvas id="utilChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Healthcare</div><canvas id="healthChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Education</div><canvas id="eduChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Misc</div><canvas id="miscChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Insurance</div><canvas id="insChart"></canvas></div></div>
            <div class="col-md-4 col-lg-3"><div class="chart-card"><div class="chart-title">Loans</div><canvas id="loanChart"></canvas></div></div>
        </div>
    </div>

    <script>
        // Data injected from Python
        const dates = {{ data.dates | tojson }};
        
        // Helper to create beautiful small charts
        function createSparkline(ctxId, label, data, color) {
            new Chart(document.getElementById(ctxId), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '20', // Add transparency for fill
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4, // Smooth curves
                        pointRadius: 0, // Hide points for clean look
                        pointHoverRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
                    scales: {
                        x: { display: false }, // Hide axes for sparkline look
                        y: { display: false, beginAtZero: true }
                    },
                    interaction: { mode: 'nearest', axis: 'x', intersect: false }
                }
            });
        }

        // 1. Create Main Chart
        const ctxMain = document.getElementById('mainChart').getContext('2d');
        // Create Gradient
        let gradInc = ctxMain.createLinearGradient(0, 0, 0, 400);
        gradInc.addColorStop(0, 'rgba(28, 200, 138, 0.5)');
        gradInc.addColorStop(1, 'rgba(28, 200, 138, 0.0)');

        let gradExp = ctxMain.createLinearGradient(0, 0, 0, 400);
        gradExp.addColorStop(0, 'rgba(78, 115, 223, 0.5)');
        gradExp.addColorStop(1, 'rgba(78, 115, 223, 0.0)');

        new Chart(ctxMain, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [
                    {
                        label: 'Income',
                        data: {{ data.income | tojson }},
                        borderColor: '#1cc88a',
                        backgroundColor: gradInc,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: 'Total Expenses',
                        data: {{ data.total_expenses | tojson }},
                        borderColor: '#4e73df',
                        backgroundColor: gradExp,
                        fill: true,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'top' } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // 2. Create All Category Sparklines
        createSparkline('rentChart', 'Rent', {{ data.rent | tojson }}, '#4e73df');
        createSparkline('groceriesChart', 'Groceries', {{ data.groceries | tojson }}, '#1cc88a');
        createSparkline('transportChart', 'Transport', {{ data.transport | tojson }}, '#36b9cc');
        createSparkline('eatingChart', 'Eating Out', {{ data.eating_out | tojson }}, '#f6c23e');
        createSparkline('entChart', 'Entertainment', {{ data.entertainment | tojson }}, '#e74a3b');
        createSparkline('utilChart', 'Utilities', {{ data.utilities | tojson }}, '#858796');
        createSparkline('healthChart', 'Healthcare', {{ data.healthcare | tojson }}, '#5a5c69');
        createSparkline('eduChart', 'Education', {{ data.education | tojson }}, '#6610f2');
        createSparkline('miscChart', 'Misc', {{ data.misc | tojson }}, '#fd7e14');
        createSparkline('insChart', 'Insurance', {{ data.insurance | tojson }}, '#20c997');
        createSparkline('loanChart', 'Loans', {{ data.loan | tojson }}, '#e83e8c');

    </script>
</body>
</html>
