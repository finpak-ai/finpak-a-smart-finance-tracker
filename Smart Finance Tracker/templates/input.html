<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTracker AI - {% if mode == 'edit' %}Update{% else %}Add{% endif %} Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 text-primary fw-bold">FinTracker AI</span>
            <div><a href="/dashboard" class="btn btn-outline-secondary btn-sm me-2">Cancel</a></div>
	    <a href="/profile" class="text-decoration-none me-3">
                <img src="{{ user.profile_pic }}" class="rounded-circle" width="35" height="35" style="object-fit: cover; border: 2px solid #ddd;">
            </a>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{% if mode == 'edit' %}Edit Your Latest Data{% else %}Add New Monthly Data{% endif %}</h4>
            </div>
            <div class="card-body p-4">
                <form action="/submit_data" method="post">
                    <input type="hidden" name="record_id" value="{{ record_id }}">

                    <div class="mb-4">
                        <label class="form-label fw-bold">Record Date</label>
                        <input type="date" name="record_date" class="form-control" required value="{{ default_date }}">
                    </div>

                    <h5 class="mb-3 text-secondary border-bottom pb-2">Personal Information</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <label class="form-label">Income ({{ symbol }})</label>
                            <input type="number" name="income" class="form-control" required value="{{ record.income if record else 50000 }}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" class="form-control" required value="{{ record.age if record else 28 }}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Dependents</label>
                            <input type="number" name="dependents" class="form-control" required value="{{ record.dependents if record else 0 }}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Occupation</label>
                            <select name="occupation" class="form-select">
                                {% for occ in occupations %}
                                <option value="{{ occ }}" {% if record and record.occupation == occ %}selected{% endif %}>{{ occ }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">City Tier</label>
                            <select name="city" class="form-select">
                                {% for city in cities %}
                                <option value="{{ city }}" {% if record and record.city_tier == city %}selected{% endif %}>{{ city }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <h5 class="mb-3 text-secondary border-bottom pb-2">Financial Goals & Expenses ({{ symbol }})</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-12"><label>Desired Savings</label><input type="number" name="desired_savings" class="form-control" value="{{ record.desired_savings if record else 15000 }}"></div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-3"><label>Rent</label><input type="number" name="rent" class="form-control" value="{{ record.rent if record else 0 }}"></div>
                        <div class="col-md-3"><label>Groceries</label><input type="number" name="groceries" class="form-control" value="{{ record.groceries if record else 0 }}"></div>
                        <div class="col-md-3"><label>Transport</label><input type="number" name="transport" class="form-control" value="{{ record.transport if record else 0 }}"></div>
                        <div class="col-md-3"><label>Eating Out</label><input type="number" name="eating_out" class="form-control" value="{{ record.eating_out if record else 0 }}"></div>
                        <div class="col-md-3"><label>Entertainment</label><input type="number" name="entertainment" class="form-control" value="{{ record.entertainment if record else 0 }}"></div>
                        <div class="col-md-3"><label>Utilities</label><input type="number" name="utilities" class="form-control" value="{{ record.utilities if record else 0 }}"></div>
                        <div class="col-md-3"><label>Healthcare</label><input type="number" name="healthcare" class="form-control" value="{{ record.healthcare if record else 0 }}"></div>
                        <div class="col-md-3"><label>Education</label><input type="number" name="education" class="form-control" value="{{ record.education if record else 0 }}"></div>
                        <div class="col-md-3"><label>Misc</label><input type="number" name="misc" class="form-control" value="{{ record.miscellaneous if record else 0 }}"></div>
                        <div class="col-md-3"><label>Insurance</label><input type="number" name="insurance" class="form-control" value="{{ record.insurance if record else 0 }}"></div>
                        <div class="col-md-3"><label>Loan Repayment</label><input type="number" name="loan" class="form-control" value="{{ record.loan_repayment if record else 0 }}"></div>
                    </div>

                    <div class="d-grid gap-2 mt-5">
                        <button type="submit" class="btn btn-success btn-lg">{% if mode == 'edit' %}Update Record{% else %}Save New Record{% endif %}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
