<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 text-primary fw-bold">Edit Profile</span>
            <a href="/dashboard" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 text-center">
                        
                        <div class="mb-4">
                            <img src="{{ user.profile_pic }}" alt="Profile" 
                                 class="rounded-circle border border-3 border-primary"
                                 style="width: 120px; height: 120px; object-fit: cover;">
                        </div>
                        
                        <h4 class="fw-bold">{{ user.full_name }}</h4>
                        <p class="text-muted">{{ user.username }}</p>

                        <hr>

                        <form action="/update_profile" method="post" enctype="multipart/form-data" class="text-start">
                            
                            <div class="mb-3">
                                <label class="form-label">Profile Picture</label>
                                <input type="file" name="profile_pic" class="form-control" accept="image/*">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="full_name" class="form-control" value="{{ user.full_name }}">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Country</label>
                                    <input type="text" name="country" class="form-control" value="{{ user.country }}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Currency</label>
                                    <select name="currency" class="form-select">
                                        <option value="PKR" {% if user.currency == 'PKR' %}selected{% endif %}>Pakistani Rupee (PKR)</option>
                                        <option value="INR" {% if user.currency == 'INR' %}selected{% endif %}>Indian Rupee (INR)</option>
                                        <option value="USD" {% if user.currency == 'USD' %}selected{% endif %}>US Dollar (USD)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
